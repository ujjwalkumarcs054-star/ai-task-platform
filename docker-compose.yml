version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai_task_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_change_me}
      CORS_ORIGIN: "*"
      TASK_QUEUE_KEY: ai_tasks_queue
    depends_on:
      - mongo
      - redis
    ports:
      - "5000:5000"

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/ai_task_platform
      REDIS_URL: redis://redis:6379
      TASK_QUEUE_KEY: ai_tasks_queue
      STAGE_DELAY_SECONDS: "1.5"
    depends_on:
      - mongo
      - redis
    deploy:
      replicas: 2

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:8080"

volumes:
  mongo_data:
